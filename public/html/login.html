<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body>
    <header class="bg-dark text-center py-3 progress-bar-striped progress-bar-animated">
        <big class="text-light shadow"><strong>CRUD</strong></big>
    </header>

    <main>
        
        <div class="container-center bg-dark text-light rounded p-3 m-5 w-25 mx-auto progress-bar-striped">
            <div class="form-group">
                <label for="usuario" class="text-light">Email</label>
                <input type="email" class="form-control shadow" id="campoEmail" placeholder="Email">
            </div>
            <div class="form-group">
                <label name="contrasena" class="text-light">Contraseña</label>
                <input type="password" name="contrasena" placeholder="Contraseña" id="campoContrasena" class="form-control shadow">
            </div>
            <div>
                <button type="submit" class="btn btn-primary shadow" id="botonLogin">Ingresar</button>
            </div>
        </div>

    </main>

    <footer>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="/js/login.js"></script>
</body>
</html>
