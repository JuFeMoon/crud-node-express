<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body>
    <header class="bg-dark text-center py-3 progress-bar-striped progress-bar-animated">
        <big class="text-light"><strong>Formulario Inasistencias</strong></big>
    </header>

<!-- 
            correo abc (texto email)
            apellido y nombre (texto corto)
            cuil (numero 11 cifras max)
            desde (fecha)
            hasta (fecha)
            tipo de inasistencia (lista checkbox con opcion
                                    "otro" para acceder a respuesta con texto)
            cursos y materias afectado/as o cargo (texto largo)
            observaciones (texto largo)
            importante (checkbox unico)
-->

    <main>
        <div class="container-center rounded bg-dark p-3 m-5 w-25 mx-auto progress-bar-striped progress-bar-animated">
            <div>
                <label for="correoABC" class="text-light">Correo ABC</label>
                <input type="email" id="correoABC" class="form-control">
            </div>
            <div>
                <label for="apellidoNombre" class="text-light">Apellido y nombre</label>
                <input type="text" id="apellidoNombre" class="form-control">
            </div>
            <div>
                <label for="cuil" class="text-light">CUIL</label>
                <input type="number" id="cuil" class="form-control">
            </div>
            <div>
                <label for="fechaInicial" class="text-light">Desde (fecha inicial)</label>
                <input type="date" id="fechaInicial" class="form-control">
            </div>
            <div>
                <label for="fechaFinal" class="text-light">Hasta (fecha final)</label>
                <input type="date" id="fechaFinal" class="form-control">
            </div>
            <div>
                <label for="tipoInasistencia" class="text-light">Tipo de inasistencia</label>
                <ul>
                    <label for=""></label>
                    <input type="checkbox" id="" class="form-control">
                </ul>
            </div>
            <div>
                <label for="cursosMateriasAfectadas" class="text-light">Cursos y materias afectadas</label>
                <input type="text" id="cursosMateriasAfectadas" class="form-control">
            </div>
            <div>
                <label for="observaciones" class="text-light">Observaciones</label>
                <input type="text" id="observaciones" class="form-control">
            </div>
            <div>
                <label for="importante" class="text-light">IMPORTANTE</label>
                <input type="checkbox" id="importante" class="form-control">
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
