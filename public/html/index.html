<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .btn:focus:not(:focus-visible) {
            outline: none;
            box-shadow: none;
        }
        .dropdown-toggle::after {
            display: none;
        }
    </style>
</head>
<body>
    <header class="bg-dark py-3 text-center progress-bar-striped progress-bar-animated">
        <big class="text-light shadow">
            <strong>VENTAS</strong>
        </big>
        <button name="botonProductos" class="btn btn-success ml-5"><strong>PRODUCTOS</strong></button>
    </header>
    


            <!-- BARRA DE HERRAMIENTAS -->
    <div class="container d-flex justify-content-around rounded" id="contenedorControles">
        <div class="d-flex justify-content-around w-50 bg-dark rounded p-3 my-3">
            <input name="campoBusqueda" type="search" placeholder="Buscar..." class="form-control w-50">
            <button id="agregarEditarVenta" class="btn btn-success" type="button">
                <strong class="text-light">Agregar</strong>
            </button>
            <button name="botonFiltrar" class="btn btn-primary" type="button">
                <strong class="text-light">Filtrar</strong>
            </button>
            <button name="botonPrueba" class="btn btn-warning">
                <strong>
                    Prods
                </strong>
            </button>
        </div>
    </div>



            <!-- CONTENIDO MAIN -->
    <main>
        <div class="container d-flex justify-content-center align-items-center my-3">
            <div class="overflow-auto" style="max-height: 66vh; width: 100%;">
                <table class="table table-striped text-center table-bordered">
                    <thead class="table-dark sticky-top">
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Sucursal</th>
                            <th>Precio Final</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody name="tablaVentas">
                    </tbody>

                </table>
            </div>
        </div>

    </main>









            <!-- MODAL PRUEBA PRODUCTOS -->
    <div class="modal fade" tabindex="-1" aria-labelledby="tituloPrueba" aria-hidden="true" id="modalPrueba">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Prueba Interfaz de Productos</h5>
                    <button class="close" data-dismiss="modal" aria-label="Cerrar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">

                    <div class="container d-flex justify-content-center align-items-center">
                        <div class="overflow-auto" style="max-height: 66vh; width: 100%;">
                            <table class="table table-striped table-bordered text-center">
                                <thead class="sticky-top text-center text-light table-dark">
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                </thead>
                                <tbody name="tablaPrueba">
                                    <tr>
                                        <td>Nombre</td>
                                        <td>Precio</td>
                                        <td>Stock</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                </div>
            </div>
        </div>
    </div>



            <!-- MODAL PARAMETROS DE BUSQUEDA (FILTRAR) -->
    <div class="modal fade" tabindex="-1" aria-labelledby="tituloFiltrar" aria-hidden="true" id="modalFiltrar">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Filtrar Listado por Parametros</h5>
                    <button class="close" data-dismiss="modal" aria-label="Cerrar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">

                    <!-- CATEGORIA -->
                    <div class="form-group">
                        <label class="form-label">Categoría</label>
                        <select name="selectCategoriaFiltro" class="form-control">
                            <option value="">Todas las categorías</option>
                            <option value="categoria1">Categoría 1</option>
                            <option value="categoria2">Categoría 2</option>
                        </select>
                    </div>
                    
                    <!-- SUCURSAL -->
                    <div class="form-group">
                        <label class="form-label">Sucursal</label>
                        <select name="selectSucursalFiltro" class="form-control">
                            <option value="">Todas las sucursales</option>
                            <option value="sucursal1">Sucursal 1</option>
                            <option value="sucursal2">Sucursal 2</option>
                        </select>
                    </div>

                    <!-- PRECIO FINAL -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="parametroPrecioMin" class="form-label">Precio Mínimo</label>
                                <input name="parametroPrecioMin" type="number" class="form-control" placeholder="Min">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="parametroPrecioMax" class="form-label">Precio Máximo</label>
                                <input name="parametroPrecioMax" type="number" class="form-control" placeholder="Max">
                            </div>
                        </div>
                    </div>

                    <!-- FECHA -->
                    <div class="form-group">
                        <label for="" class="form-label">Fecha</label>
                        <input name="inputFechaFiltro" type="date" class="form-control">
                    </div>

                    <!-- HORA -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group text-mute">
                                <label for="" class="form-label">Desde...</label>
                                <input name="inputHoraFiltroMin" type="time" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group text-mute">
                                <label for="" class="form-label">Hasta...</label>
                                <input name="inputHoraFiltroMax" type="time" class="form-control">
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                    <button name="botonFiltrarAplicar" class="btn btn-primary">Aplicar</button>
                    <button class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>



            <!-- MODAL CONFIRMAR ELIMINACION (func. ELIMINAR) -->
    <div class="modal fade" tabindex="-1" aria-labelledby="tituloEliminar" aria-hidden="true" id="modalEliminar">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar Elementos</h5>
                    <button class="close" data-dismiss="modal" aria-label="Cerrar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body text-center">
                    <p>¿Está seguro de que desea eliminar este elemento?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" name="botonConfirmarEliminar">Confirmar</button>
                    <button type="button" class="btn btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </div>



            <!-- MODAL FORMULARIO AGREGAR FILA (func. AGREGAR) -->
    <div class="modal fade" tabindex="-1" aria-labelledby="tituloFormAgregar" aria-hidden="true" id="modalAgregarEjemplo">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Agregar Nuevo Elemento</h5>
                    <button class="close" data-dismiss="modal" aria-label="Cerrar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="selectProductos" class="form-label">Productos</label>
                        <select name="selectProductos" class="form-control">
                            
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nombreCliente" class="form-label">Nombre del Cliente</label>
                        <input name="nombreCliente" type="text" class="form-control" placeholder="Ingrese el nombre del cliente">
                    </div>
                    <div class="form-group">
                        <label for="categoria" class="form-label">Categoría</label>
                        <select name="selectCategoria" class="form-control">
                            <option value="">Seleccione una categoría</option>
                            <option value="categoria1">Categoría 1</option>
                            <option value="categoria2">Categoría 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="selectSucursal" class="form-label">Sucursal</label>
                        <select name="selectSucursal" class="form-control">
                            <option value="">Seleccione la sucursal</option>
                            <option value="sucursal1">Sucursal 1</option>
                            <option value="sucursal2">Sucursal 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="precioFinal" class="form-label">Precio Final</label>
                        <input name="precioFinal" type="float" class="form-control" placeholder="Ingrese el precio final">
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input name="fecha" type="date" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="hora" class="form-label">Hora</label>
                                <input name="hora" type="time" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button name="botonGuardar" type="button" class="btn btn-primary" data-dismiss="modal">Guardar</button>
                    <button type="button" class="btn btn-danger text-light" data-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>



            <!-- MODAL FORMULARIO EDITAR (EDITAR) -->
    <div class="modal fade" tabindex="-1" aria-labelledby="tituloFormEditar" aria-hidden="true" id="modalEditarEjemplo">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Elemento</h5>
                    <button class="close" data-dismiss="modal" aria-label="Cerrar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="nombreCliente" class="form-label">Nombre del Cliente</label>
                        <input value="cliente" name="nombreCliente" type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="nombreProducto" class="form-label">Nombre del Producto</label>
                        <input value="producto" name="nombreProducto" type="text" class="form-control" placeholder="Ingrese el nombre del producto">
                    </div>
                    <div class="form-group">
                        <label for="categoria" class="form-label">Categoría</label>
                        <select name="selectCategoria" class="form-control">
                            <option value="">Seleccione una categoría</option>
                            <option value="categoria1" selected>Categoría 1</option>
                            <option value="categoria2">Categoría 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="selectSucursal" class="form-label">Sucursal</label>
                        <select name="selectSucursalEditar" class="form-control">
                            <option value="">Seleccione la sucursal</option>
                            <option value="sucursal1">Sucursal 1</option>
                            <option value="sucursal2">Sucursal 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="precioFinal" class="form-label">Precio Final</label>
                        <input value="100" name="precioFinal" type="float" class="form-control" placeholder="Ingrese el precio final">
                    </div>
                    <div class="form-group">
                        <label for="fecha" class="form-label">Fecha</label>
                        <input value="2026-06-04" name="fecha" type="date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="hora" class="form-label">Hora</label>
                        <input value="12:00" name="hora" type="time" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button name="modalEditarGuardar" type="button" class="btn btn-primary" data-dismiss="modal">Guardar</button>
                    <button type="button" class="btn btn-danger text-light" data-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>



            <!-- CONTENIDO FOOTER -->
    <footer>
    </footer>

            <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
